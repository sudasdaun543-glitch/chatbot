kind = "web"
previewPath = "/"
title = "AI Chat Simulator"
version = "1.0.0"
id = "artifacts/chat-simulator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25060

[services.development]
run = "pnpm --filter @workspace/chat-simulator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chat-simulator", "run", "build" ]
publicDir = "artifacts/chat-simulator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25060"
BASE_PATH = "/"
